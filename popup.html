<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JAGRES AI ASSISTANT</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 380px;
      min-height: 500px;
      background: linear-gradient(145deg, #0d0416 0%, #1a0a2e 30%, #0d0416 70%, #150820 100%);
      color: #e0d0f0;
      font-family: 'Outfit', sans-serif;
      overflow-x: hidden;
    }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(255,215,0,0.3); border-radius: 2px; }

    /* Header */
    .header {
      background: linear-gradient(135deg, rgba(255,215,0,0.08), rgba(255,165,0,0.05));
      border-bottom: 1px solid rgba(255,215,0,0.15);
      padding: 16px;
      text-align: center;
    }
    .header h1 {
      font-size: 18px;
      font-weight: 900;
      background: linear-gradient(135deg, #fd700, #ffaa00, #fd700);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      letter-spacing: 2px;
    }
    .header .subtitle {
      font-size: 10px;
      color: #ce93d8;
      letter-spacing: 3px;
      margin-top: 4px;
      text-transform: uppercase;
    }
    .header .version {
      font-size: 9px;
      color: rgba(255,215,0,0.4);
      margin-top: 2px;
    }

    /* Status Bar */
    .status-bar {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      padding: 8px;
      background: rgba(0,255,136,0.05);
      border-bottom: 1px solid rgba(0,255,136,0.1);
    }
    .status-dot {
      width: 6px; height: 6px;
      background: #00ff88;
      border-radius: 50%;
      animation: statusPulse 2s ease-in-out infinite;
    }
    @keyframes statusPulse {
      0%, 100% { opacity: 1; box-shadow: 0 0 4px #00ff88; }
      50% { opacity: 0.5; box-shadow: 0 8px #00ff88; }
    }
    .status-text {
      font-size: 10px;
      color: #00ff88;
      letter-spacing: 1px;
      font-weight: 600;
    }

    /* Sections */
    .section {
      padding: 16px;
      border-bottom: 1px solid rgba(255,215,0,0.08);
    }
    .section-title {
      font-size: 11px;
      font-weight: 800;
      color: #ffd700;
      letter-spacing: 2px;
      margin-bottom: 12px;
      text-transform: uppercase;
    }

    /* Inputs */
    input[type="text"], input[type="password"], textarea, select {
      width: 100%;
      padding: 10px 12px;
      background: rgba(25, 8, 38, 0.8);
      border: 1px solid rgba(255,215,0.15);
      border-radius: 8px;
      color: #e0d0f0;
      font-size: 13px;
      font-family: 'Outfit', sans-serif;
      outline: none;
      transition: all 0.3s;
      margin-bottom: 8px;
    }
    input:focus, textarea:focus, select:focus {
      border-color: rgba(255,215,0,0.5);
      box-shadow: 0 0 12px rgba(255,215,0.1);
    }
    textarea { resize: vertical; min-height: 60px; }
    select { cursor: pointer; }
    select option { background: #1a0a2e; color: #e0d0f0; }

    /* Labels */
    .input-label {
      font-size: 10px;
      font-weight: 700;
      color: #ce93d8;
      letter-spacing: 1px;
      margin-bottom: 4px;
      display: block;
      text-transform: uppercase;
    }

    /* Buttons */
    .btn {
      width: 100%;
      padding: 12px;
      border: 1px solid rgba(255,215,0,0.3);
      border-radius: 10px;
      font-size: 12px;
      font-weight: 700;
      font-family: 'Outfit', sans-serif;
      cursor: pointer;
      transition: all 0.3s;
      letter-spacing: 1px;
      text-transform: uppercase;
    }
    .btn-primary {
      background: linear-gradient(135deg, rgba(255,215,0,0.15), rgba(255,165,0.1));
      color: #fd700;
    }
    .btn-primary:hover {
      background: linear-gradient(135deg, rgba(255,215,0,0.25), rgba(255,165,0.2));
      border-color: #ffd700;
      box-shadow: 0 0 15px rgba(255,215,0,0.15);
      transform: translateY(-1px);
    }
    .btn-secondary {
      background: rgba(206,147,216,0.1);
      border-color: rgba(206,147,216,0.3);
      color: #ce93d8;
    }
    .btn-secondary:hover {
      background: rgba(206,147,216,0.2);
      border-color: #ce93d8;
    }
    .btn-save {
      background: linear-gradient(135deg, rgba(0,255,136,0.15), rgba(0,200,100,0.1));
      border-color: rgba(0,255,136,0.3);
      color: #00ff88;
    }
    .btn-save:hover {
      background: linear-gradient(135deg, rgba(0,255,136,0.25), rgba(0,200,100,0.2));
      border-color: #00ff88;
      box-shadow: 0 0 15px rgba(0,255,136,0.15);
    }

    /* Result Box */
    .result-box {
      background: rgba(25, 8, 38, 0.6);
      border: 1px solid rgba(255,215,0.12);
      border-radius: 10px;
      padding: 12px;
      margin-top: 10px;
      display: none;
    }
    .result-box.show { display: block; }
    .result-text {
      font-size: 13px;
      color: #e8e0f0;
      line-height: 1.5;
      word-wrap: break-word;
      white-space: pre-wrap;
    }
    .result-actions {
      display: flex;
      gap: 8px;
      margin-top: 10px;
    }
    .result-actions .btn { flex: 1; padding: 8px; font-size: 11px; }

    /* Thread Results */
    .thread-container { display: flex; flex-direction: column; gap: 8px; }
    .thread-tweet {
      background: rgba(25, 8, 38, 0.5);
      border: 1px solid rgba(255,215,0.1);
      border-radius: 8px;
      padding: 10px;
    }
    .thread-tweet-label {
      font-size: 9px;
      font-weight: 700;
      color: #ffd700;
      letter-spacing: 1px;
      margin-bottom: 4px;
    }
    .thread-tweet-text {
      font-size: 12px;
      color: #e0d0f0;
      line-height: 1.4;
    }
    .thread-tweet-copy {
      margin-top: 6px;
      padding: 4px 10px;
      background: rgba(255,215,0,0.1);
      border: 1px solid rgba(255,215,0,0.2);
      border-radius: 6px;
      color: #ffd700;
      font-size: 10px;
      cursor: pointer;
      font-family: 'Outfit', sans-serif;
    }

    /* Batch Results */
    .batch-container { display: flex; flex-direction: column; gap: 8px; }
    .batch-tweet {
      background: rgba(25, 8, 38, 0.5);
      border: 1px solid rgba(206,147,216,0.15);
      border-radius: 8px;
      padding: 10px;
    }
    .batch-tweet-tone {
      font-size: 9px;
      font-weight: 700;
      color: #ce93d8;
      letter-spacing: 1px;
      margin-bottom: 4px;
      text-transform: uppercase;
    }
    .batch-tweet-text {
      font-size: 12px;
      color: #e0d0f0;
      line-height: 1.4;
    }
    .batch-tweet-copy {
      margin-top: 6px;
      padding: 4px 10px;
      background: rgba(206,147,216,0.1);
      border: 1px solid rgba(206,147,216,0.2);
      border-radius: 6px;
      color: #ce93d8;
      font-size: 10px;
      cursor: pointer;
      font-family: 'Outfit', sans-serif;
    }

    /* Active Persona Display */
    .active-persona-display {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 12px;
      background: rgba(255,215,0,0.05);
      border: 1px solid rgba(255,215,0,0.15);
      border-radius: 8px;
      margin-bottom: 12px;
    }
    .active-persona-label {
      font-size: 9px;
      font-weight: 700;
      color: #ce93d8;
      letter-spacing: 1px;
      text-transform: uppercase;
    }
    .active-persona-name {
      font-size: 13px;
      font-weight: 700;
      color: #ffd700;
    }

    /* Persona Grid */
    #personaGrid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      max-height: 240px;
      overflow-y: auto;
      margin-bottom: 12px;
      padding: 2px;
    }
    .persona-card {
      background: rgba(25, 8, 38, 0.8);
      border: 1px solid rgba(255, 215, 0, 0.2);
      border-radius: 10px;
      padding: 10px 6px;
      cursor: pointer;
      transition: all 0.3s ease;
      text-align: center;
      position: relative;
    }
    .persona-card:hover {
      border-color: rgba(255, 215, 0, 0.5);
      transform: translateY(-2px);
      box-shadow: 0 4px 12px rgba(255, 215, 0, 0.15);
    }
    .persona-card.active {
      border-color: #ffd700;
      background: rgba(255, 215, 0, 0.1);
      box-shadow: 0 0 15px rgba(255, 215, 0, 0.2);
    }
    .persona-card .persona-emoji {
      font-size: 24px;
      display: block;
      margin-bottom: 4px;
    }
    .persona-card .persona-card-name {
      font-size: 10px;
      font-weight: 700;
      color: #ffd700;
      letter-spacing: 0.5px;
    }
    .persona-card .persona-card-desc {
      font-size: 8px;
      color: #ce93d8;
      margin-top: 2px;
      line-height: 1.3;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .persona-delete-btn {
      position: absolute;
      top: 3px;
      right: 3px;
      background: rgba(255, 64, 0.2);
      border: 1px solid rgba(255, 64, 0.4);
      border-radius: 50%;
      width: 16px;
      height: 16px;
      font-size: 9px;
      color: #ff4040;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      transition: opacity 0.2s;
      line-height: 1;
    }
    .persona-card:hover .persona-delete-btn {
      opacity: 1;
    }
    .persona-delete-btn:hover {
      background: rgba(255, 64, 0.4);
    }

    /* Create Persona Form */
    .create-persona-section {
      border-top: 1px solid rgba(255,215,0,0.1);
      padding-top: 12px;
      margin-top: 4px;
    }
    .create-persona-title {
      font-size: 10px;
      font-weight: 700;
      color: #ce93d8;
      letter-spacing: 1px;
      margin-bottom: 8px;
      text-transform: uppercase;
    }

    /* Status Message */
    #statusMessage {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      padding: 10px;
      text-align: center;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.5px;
      z-index: 9999;
      transform: translateY(-100%);
      transition: transform 0.3s ease;
      font-family: 'Outfit', sans-serif;
    }
    #statusMessage.show { transform: translateY(0); }
    #statusMessage.success {
      background: linear-gradient(135deg, rgba(0,255,136,0.15), rgba(0,200,100,0.1));
      border-bottom: 1px solid rgba(0,255,136,0.3);
      color: #00ff88;
    }
    #statusMessage.error {
      background: linear-gradient(135deg, rgba(255,64,0.15), rgba(200,0,0.1));
      border-bottom: 1px solid rgba(255,64,64,0.3);
      color: #ff6464;
    }
    #statusMessage.warning {
      background: linear-gradient(135deg, rgba(255,165,0,0.15), rgba(200,130,0,0.1));
      border-bottom: 1px solid rgba(255,165,0.3);
      color: #ffaa00;
    }

    /* Loading Spinner */
    .loading {
      display: none;
      text-align: center;
      padding: 16px;
    }
    .loading.show { display: block; }
    .spinner {
      width: 24px; height: 24px;
      border: 2px solid rgba(255,215,0,0.2);
      border-top-color: #ffd700;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 8px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading-text {
      font-size: 11px;
      color: #ce93d8;
      letter-spacing: 1px;
    }

    /* Shake Animation */
    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(-4px); }
      75% { transform: translateX(4px); }
    }
    .shake { animation: shake 0.3s ease; }
  </style>
</head>
<body>

  <!-- Status Message -->
  <div id="statusMessage"></div>

  <!-- Header -->
  <div class="header">
    <h1>⚡ JAGRES AI</h1>
    <div class="subtitle">Twitter AI Assistant</div>
    <div class="version">v2.0 — Custom Persona Edition</div>
  </div>

  <!-- Status Bar -->
  <div class="status-bar">
    <div class="status-dot"></div>
    <span class="status-text">NEURAL NETWORK ACTIVE</span>
  </div>

  <!-- Persona Manager Section -->
  <div class="section">
    <div class="section-title">🎭 PERSONA MANAGER</div>

    <div class="active-persona-display">
      <span class="active-persona-label">ACTIVE PERSONA</span>
      <span class="active-persona-name" id="activePersonaName">🤖 Default</span>
    </div>

    <div id="personaGrid"></div>

    <div class="create-persona-section">
      <div class="create-persona-title">CREATE CUSTOM PERSONA</div>
      <input type="text" id="personaName" placeholder="Persona name (e.g. Savage Queen)" />
      <input type="text" id="personaEmoji" placeholder="Emoji (e.g. 👑)" maxlength="4" />
      <input type="text" id="personaDesc" placeholder="Short description (optional)" />
      <textarea id="personaInstruction" placeholder="Character instruction — how should this persona talk? What's their personality? (required)" rows="3"></textarea>
      <select id="personaTone">
        <option value="casual">😎 Casual</option>
        <option value="storytelling">📖 Storytelling</option>
        <option value="opinion">🔥 Opini</option>
        <option value="humor">😂 Humor</option>
        <option value="informative">💡 Informatif</option>
        <option value="hype">⚡ Hype</option>
      </select>
      <button class="btn btn-save" id="savePersona">🎭 SAVE PERSONA</button>
    </div>
  </div>

  <!-- API Settings -->
  <div class="section">
    <div class="section-title">⚙️ NEURAL NETWORK SETTINGS</div>
    <label class="input-label">GROQ API KEY</label>
    <input type="password" id="apiKey" placeholder="gsk_xxxxxxxxxxxxxxxx" />
    <button class="btn btn-save" id="saveKey">💾 SAVE API KEY</button>
  </div>

  <!-- Content Creator -->
  <div class="section">
    <div class="section-title">✍️ CONTENT CREATOR</div>
    <label class="input-label">TOPIC / IDEA</label>
    <textarea id="tweetTopic" placeholder="What do you want to tweet about?" rows="2"></textarea>

    <label class="input-label">TONE</label>
    <select id="tweetStyle">
      <option value="casual">😎 Casual</option>
      <option value="storytelling">📖 Storytelling</option>
      <option value="opinion">🔥 Opini Tajam</option>
      <option value="humor">😂 Humor</option>
      <option value="informative">💡 Informatif</option>
      <option value="hype">⚡ Hype</option>
    </select>

    <label class="input-label">LANGUAGE</label>
    <select id="tweetLanguage">
      <option value="indonesian">🇮🇩 Indonesia</option>
      <option value="english">🇺🇸 English</option>
      <option value="japanese">🇯🇵 日本語</option>
    </select>

    <div style="display: flex; gap: 8px; margin-top: 4px;">
      <button class="btn btn-primary" id="generateTweet" style="flex:1;">⚡ SINGLE TWEET</button>
      <button class="btn btn-secondary" id="generateThread" style="flex:1;">🧵 THREAD (3)</button>
    </div>

    <!-- Loading -->
    <div class="loading" id="loading">
      <div class="spinner"></div>
      <div class="loading-text">GENERATING...</div>
    </div>

    <!-- Single Tweet Result -->
    <div class="result-box" id="tweetResult">
      <div class="result-text" id="tweetResultText"></div>
      <div class="result-actions">
        <button class="btn btn-primary" id="copyTweet">📋 COPY</button>
        <button class="btn btn-secondary" id="regenTweet">🔄 REGEN</button>
      </div>
    </div>

    <!-- Thread Result -->
    <div class="result-box" id="threadResult">
      <div class="thread-container" id="threadContainer"></div>
    </div>
  </div>

  <!-- Batch Generator -->
  <div class="section">
    <div class="section-title">📦 BATCH GENERATOR</div>
    <label class="input-label">TOPIC</label>
    <input type="text" id="batchTopic" placeholder="Topic for batch generation" />
    <button class="btn btn-primary" id="generateBatch">📦 GENERATE 3 VARIATIONS</button>

    <div class="loading" id="batchLoading">
      <div class="spinner"></div>
      <div class="loading-text">GENERATING BATCH...</div>
    </div>

    <div class="result-box" id="batchResult">
      <div class="batch-container" id="batchContainer"></div>
    </div>
  </div>

  <!-- Footer -->
  <div style="padding: 12px; text-align: center;">
    <div style="font-size: 9px; color: rgba(255,215,0,0.3); letter-spacing: 1px;">
      JAGRES AI ASSISTANT v2.0 — CUSTOM PERSONA EDITION
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
